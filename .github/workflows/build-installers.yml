name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop-app

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: desktop-app

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splitlab-${{ matrix.os }}
          path: |
            desktop-app/src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Publish GitHub release assets (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            desktop-app/src-tauri/target/release/bundle/**/*.dmg
            desktop-app/src-tauri/target/release/bundle/**/*.app.tar.gz
            desktop-app/src-tauri/target/release/bundle/**/*.msi
            desktop-app/src-tauri/target/release/bundle/**/*.exe
