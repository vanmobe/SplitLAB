name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop-app

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="${TAG_VERSION%%-*}"
          export APP_VERSION
          echo "Using tag version: ${TAG_VERSION}"
          echo "Using app bundle version: ${APP_VERSION}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["APP_VERSION"]

          tauri_conf = Path("desktop-app/src-tauri/tauri.conf.json")
          data = json.loads(tauri_conf.read_text(encoding="utf-8"))
          data["version"] = version
          tauri_conf.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")

          package_json = Path("desktop-app/package.json")
          pkg = json.loads(package_json.read_text(encoding="utf-8"))
          pkg["version"] = version
          package_json.write_text(json.dumps(pkg, indent=2) + "\n", encoding="utf-8")

          cargo_toml = Path("desktop-app/src-tauri/Cargo.toml")
          lines = cargo_toml.read_text(encoding="utf-8").splitlines()
          out = []
          in_package = False
          replaced = False
          for line in lines:
            stripped = line.strip()
            if stripped.startswith("[") and stripped.endswith("]"):
              in_package = stripped == "[package]"
            if in_package and stripped.startswith("version = "):
              out.append(f'version = "{version}"')
              replaced = True
            else:
              out.append(line)
          if not replaced:
            raise SystemExit("Could not update version in desktop-app/src-tauri/Cargo.toml")
          cargo_toml.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

      - name: Prepare offline engine bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          python desktop-app/scripts/prepare_engine_bundle.py \
            --engine-dir engine \
            --bundle-dir desktop-app/resources/engine_bundle \
            --bundle-id "${GITHUB_SHA}"
          python -m venv desktop-app/resources/engine_bundle/.venv
          desktop-app/resources/engine_bundle/.venv/bin/python -m pip install --upgrade pip
          desktop-app/resources/engine_bundle/.venv/bin/python -m pip install -r desktop-app/resources/engine_bundle/requirements.txt
          echo ok > desktop-app/resources/engine_bundle/.venv/.splitlab_runtime_ready

      - name: Prepare offline engine bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python desktop-app/scripts/prepare_engine_bundle.py `
            --engine-dir engine `
            --bundle-dir desktop-app/resources/engine_bundle `
            --bundle-id $env:GITHUB_SHA
          python -m venv desktop-app/resources/engine_bundle/.venv
          desktop-app/resources/engine_bundle/.venv/Scripts/python.exe -m pip install --upgrade pip
          desktop-app/resources/engine_bundle/.venv/Scripts/python.exe -m pip install -r desktop-app/resources/engine_bundle/requirements.txt
          $pyBase = (python -c "import sys; print(sys.base_prefix)").Trim()
          Remove-Item -Recurse -Force desktop-app/resources/engine_bundle/.python_runtime -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path desktop-app/resources/engine_bundle/.python_runtime | Out-Null
          robocopy $pyBase desktop-app/resources/engine_bundle/.python_runtime /E /R:2 /W:2 /NFL /NDL /NJH /NJS /NC /NS | Out-Null
          if ($LASTEXITCODE -ge 8) {
            throw "Failed to copy bundled Python runtime (robocopy exit code $LASTEXITCODE)."
          }
          # robocopy uses non-zero codes for successful copies (0-7).
          $global:LASTEXITCODE = 0
          Set-Content -Path desktop-app/resources/engine_bundle/.venv/.splitlab_runtime_ready -Value "ok"

      - name: Verify bundled engine payload
        shell: bash
        run: |
          set -euo pipefail
          test -f desktop-app/resources/engine_bundle/server.py
          test -f desktop-app/resources/engine_bundle/requirements.txt
          echo "Bundled engine payload ready:"
          ls -la desktop-app/resources/engine_bundle

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: desktop-app

      - name: Ensure macOS app archive exists
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          APP_ARCHIVES=(desktop-app/src-tauri/target/release/bundle/macos/*.app.tar.gz)
          if [ ${#APP_ARCHIVES[@]} -gt 0 ]; then
            echo "macOS app archive already exists."
            ls -1 "${APP_ARCHIVES[@]}"
            exit 0
          fi

          APPS=(desktop-app/src-tauri/target/release/bundle/macos/*.app)
          if [ ${#APPS[@]} -eq 0 ]; then
            echo "No .app bundle found to archive."
            exit 1
          fi

          APP_PATH="${APPS[0]}"
          APP_DIR="$(dirname "$APP_PATH")"
          APP_NAME="$(basename "$APP_PATH")"
          OUT_NAME="${APP_NAME}.tar.gz"
          echo "Creating ${OUT_NAME} from ${APP_NAME}"
          (cd "$APP_DIR" && tar -czf "$OUT_NAME" "$APP_NAME")
          ls -1 "$APP_DIR"/*.app.tar.gz

      - name: Verify macOS installers
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          DMG=(desktop-app/src-tauri/target/release/bundle/dmg/*.dmg)
          APP_TAR=(desktop-app/src-tauri/target/release/bundle/macos/*.app.tar.gz)
          if [ ${#DMG[@]} -eq 0 ] || [ ${#APP_TAR[@]} -eq 0 ]; then
            echo "Expected macOS installers (.dmg and .app.tar.gz) were not produced."
            exit 1
          fi
          echo "Found macOS installers:"
          ls -1 desktop-app/src-tauri/target/release/bundle/dmg/*.dmg
          ls -1 desktop-app/src-tauri/target/release/bundle/macos/*.app.tar.gz

      - name: Verify Windows installers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "desktop-app/src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue
          $exe = Get-ChildItem -Path "desktop-app/src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue
          if (-not $msi -or -not $exe) {
            Write-Error "Expected Windows installers (.msi and .exe) were not produced."
            exit 1
          }
          Write-Host "Found Windows installers:"
          $msi | ForEach-Object { $_.FullName }
          $exe | ForEach-Object { $_.FullName }

      - name: Upload installer artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: splitlab-macos
          path: |
            desktop-app/src-tauri/target/release/bundle/dmg/*.dmg
            desktop-app/src-tauri/target/release/bundle/macos/*.app.tar.gz
          retention-days: 14
          if-no-files-found: error

      - name: Upload installer artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: splitlab-windows
          path: |
            desktop-app/src-tauri/target/release/bundle/msi/*.msi
            desktop-app/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: release-assets
          merge-multiple: true

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          while IFS= read -r -d '' f; do
            cp "$f" "release-upload/$(basename "$f")"
          done < <(find release-assets -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.msi" -o -name "*.exe" \) -print0)
          echo "Collected files:"
          ls -la release-upload || true

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          NOTES="release-notes.md"

          mapfile -t MAC_FILES < <(find release-upload -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) | sort)
          mapfile -t WIN_FILES < <(find release-upload -maxdepth 1 -type f \( -name "*.msi" -o -name "*.exe" \) | sort)

          {
            echo "# SPLITLAB ${TAG}"
            echo
            echo "## Downloads"
            echo
            echo "### macOS"
            if [ ${#MAC_FILES[@]} -eq 0 ]; then
              echo "- No macOS installers found in artifacts."
            else
              for f in "${MAC_FILES[@]}"; do
                name="$(basename "$f")"
                url_name="${name// /%20}"
                echo "- [${name}](https://github.com/${REPO}/releases/download/${TAG}/${url_name})"
              done
            fi
            echo
            echo "### Windows"
            if [ ${#WIN_FILES[@]} -eq 0 ]; then
              echo "- No Windows installers found in artifacts."
            else
              for f in "${WIN_FILES[@]}"; do
                name="$(basename "$f")"
                url_name="${name// /%20}"
                echo "- [${name}](https://github.com/${REPO}/releases/download/${TAG}/${url_name})"
              done
            fi
            echo
            echo "## Notes"
            echo
            echo "- Local AI stem separation"
            echo "- Cross-platform desktop app (macOS + Windows)"
            echo "- Optional model ensemble for higher quality output"
          } > "${NOTES}"

          echo "Generated release notes:"
          cat "${NOTES}"

      - name: Verify release assets exist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(
            release-upload/*.dmg
            release-upload/*.app.tar.gz
            release-upload/*.msi
            release-upload/*.exe
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No installer files found in release-upload. Failing release job."
            exit 1
          fi
          echo "Release assets to publish:"
          ls -1 "${FILES[@]}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            release-upload/*.dmg
            release-upload/*.app.tar.gz
            release-upload/*.msi
            release-upload/*.exe
